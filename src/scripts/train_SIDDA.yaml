model : cnn
dataset: "astrogeo"
train_data :
  input_path : /data/zagorulia/synt_14_02_26/
  output_path : None
  target_input_path: /data/zagorulia/images_verApr2025
  target_output_path: None

parameters :
  lr : 1.0e-2
  weight_decay : 1.0e-3
  val_size : 0.2
  batch_size : 128
  epochs : 50
  early_stopping : 50
  report_interval : 1
  lr_decay : 0.1
  milestones : [ 25, 40 ]
  warmup: 10
  num_workers: 4
seed: 10

save_dir : ./model.pt